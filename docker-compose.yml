version: '3.8'
services:
  node1:
    build: .
    ports:
      - "8080:8080"
      - "12000:12000"
    command: [
      "./raftkv",
      "--http-addr=:8080",
      "--raft-addr=:12000",
      "--node-id=node1",
      "--peers=node2:node2:12000,node3:node3:12000"
    ]
    networks:
      - raft

  node2:
    build: .
    ports:
      - "8081:8080"
      - "12001:12000"
    command: [
      "./raftkv",
      "--http-addr=:8080",
      "--raft-addr=:12000",
      "--node-id=node2",
      "--peers=node1:node1:12000,node3:node3:12000"
    ]
    networks:
      - raft

  node3:
    build: .
    ports:
      - "8082:8080"
      - "12002:12000"
    command: [
      "./raftkv",
      "--http-addr=:8080",
      "--raft-addr=:12000",
      "--node-id=node3",
      "--peers=node1:node1:12000,node2:node2:12000"
    ]
    networks:
      - raft

networks:
  raft:
    driver: bridge