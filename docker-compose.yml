version: '3.8'
services:
  node1:
    build: .
    ports:
      - "8080:8080"
      - "12000:12000"
    command: ["./raftkv", "--http-addr=:8080", "--raft-addr=:12000", "--node-id=node1", "--peers=node1,node2,node3"]
  
  node2:
    build: .
    ports:
      - "8081:8080"
      - "12001:12000"
    command: ["./raftkv", "--http-addr=:8080", "--raft-addr=:12000", "--node-id=node2", "--peers=node1,node2,node3"]
  
  node3:
    build: .
    ports:
      - "8082:8080"
      - "12002:12000"
    command: ["./raftkv", "--http-addr=:8080", "--raft-addr=:12000", "--node-id=node3", "--peers=node1,node2,node3"]